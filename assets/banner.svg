<svg viewBox="0 0 900 240" width="900" height="240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Darren Björn Maddara — 迷えば敗れる (Hesitation is defeat)">
  <style>
    .flake { animation: fall linear infinite; }
    @keyframes fall {
      0%   { transform: translate(0, -24px); opacity: 0; }
      8%   { opacity: 0.85; }
      88%  { opacity: 0.85; }
      100% { transform: translate(-22px, 264px); opacity: 0; }
    }
    .label { font-family: ui-monospace, "Cascadia Mono", "Consolas", "Courier New", monospace; }
    .name  { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
    @media (prefers-reduced-motion: reduce) {
      .flake { animation: none; opacity: 0.5; }
    }
  </style>

  <!-- Canvas -->
  <rect x="0" y="0" width="900" height="240" rx="10" fill="#070709"/>

  <!-- Faint mountain ridge, lower right -->
  <path d="M 520 240 L 640 148 L 700 196 L 760 152 L 830 206 L 900 160 L 900 240 Z" fill="#101018"/>

  <!-- Codec bracket corners -->
  <path d="M 14 30 L 14 14 L 30 14" fill="none" stroke="#24356f" stroke-width="2"/>
  <path d="M 870 14 L 886 14 L 886 30" fill="none" stroke="#24356f" stroke-width="2"/>
  <path d="M 886 210 L 886 226 L 870 226" fill="none" stroke="#24356f" stroke-width="2"/>
  <path d="M 30 226 L 14 226 L 14 210" fill="none" stroke="#24356f" stroke-width="2"/>

  <!-- Katana, floating diagonally on the right -->
  <g transform="translate(556, 158) rotate(-16)">
    <!-- Tsuka (handle) -->
    <rect x="-92" y="-7" width="82" height="14" rx="5" fill="#141d3d"/>
    <!-- Ito wrap diamonds -->
    <rect x="-80" y="-4" width="8" height="8" transform="rotate(45 -76 0)" fill="#24356f"/>
    <rect x="-62" y="-4" width="8" height="8" transform="rotate(45 -58 0)" fill="#24356f"/>
    <rect x="-44" y="-4" width="8" height="8" transform="rotate(45 -40 0)" fill="#24356f"/>
    <rect x="-26" y="-4" width="8" height="8" transform="rotate(45 -22 0)" fill="#24356f"/>
    <!-- Kashira (pommel) -->
    <rect x="-96" y="-6" width="6" height="12" rx="2" fill="#24356f"/>
    <!-- Tsuba (guard) -->
    <circle cx="-2" cy="0" r="14" fill="#24356f"/>
    <circle cx="-2" cy="0" r="4.5" fill="#070709"/>
    <!-- Blade with gentle sori (curve), tapering to kissaki (tip) -->
    <path d="M 12 -5.5
             C 110 -11, 210 -13, 296 -9
             L 308 -2.5
             C 210 -0.5, 110 3, 12 5.5
             Q 8 0, 12 -5.5 Z" fill="#cdd6ee"/>
    <!-- Hamon (temper line) -->
    <path d="M 16 1.5 C 110 -0.5, 208 -3.5, 300 -4.5" fill="none" stroke="#8598c9" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- Snowfall -->
  <circle class="flake" cx="70"  cy="0" r="2.6" fill="#cdd6ee" style="animation-duration: 8s;   animation-delay: 0s;"/>
  <circle class="flake" cx="150" cy="0" r="1.8" fill="#8598c9" style="animation-duration: 11s;  animation-delay: 2.4s;"/>
  <circle class="flake" cx="235" cy="0" r="2.2" fill="#cdd6ee" style="animation-duration: 9s;   animation-delay: 1.1s;"/>
  <circle class="flake" cx="330" cy="0" r="1.6" fill="#8598c9" style="animation-duration: 12s;  animation-delay: 4.2s;"/>
  <circle class="flake" cx="410" cy="0" r="2.4" fill="#cdd6ee" style="animation-duration: 8.5s; animation-delay: 0.6s;"/>
  <circle class="flake" cx="495" cy="0" r="1.8" fill="#8598c9" style="animation-duration: 10s;  animation-delay: 3.1s;"/>
  <circle class="flake" cx="565" cy="0" r="2.6" fill="#cdd6ee" style="animation-duration: 9.5s; animation-delay: 1.8s;"/>
  <circle class="flake" cx="645" cy="0" r="1.6" fill="#8598c9" style="animation-duration: 12.5s;animation-delay: 5s;"/>
  <circle class="flake" cx="720" cy="0" r="2.2" fill="#cdd6ee" style="animation-duration: 8.8s; animation-delay: 2s;"/>
  <circle class="flake" cx="800" cy="0" r="2.4" fill="#cdd6ee" style="animation-duration: 10.5s;animation-delay: 0.3s;"/>
  <circle class="flake" cx="860" cy="0" r="1.8" fill="#8598c9" style="animation-duration: 11.5s;animation-delay: 3.7s;"/>

  <!-- Identity block -->
  <text x="48" y="88"  class="label" font-size="12" letter-spacing="3.5" fill="#56668f">RENMADZ // PROFILE</text>
  <text x="48" y="126" class="name"  font-size="31" font-weight="500" fill="#f2f2f2">Darren Björn Maddara</text>
  <text x="48" y="154" class="label" font-size="13.5" fill="#8598c9">迷えば敗れる — "Hesitation is defeat."</text>
  <text x="48" y="200" class="label" font-size="11" letter-spacing="2.5" fill="#56668f">C · C# · PYTHON · TYPESCRIPT · WINFORMS</text>
</svg>
